<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Subodha</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0f172a;
    color:#f1f5f9;
    overflow-x:hidden;
}

/* BACKGROUND */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(15,23,42,0.82),
        rgba(15,23,42,0.88)
    ),
    url("Images/Background.jpg");

    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* NAVBAR */

header{
    width:100%;
    padding:22px 7%;
    display:flex;
    justify-content:space-between;
    align-items:center;

    position:fixed;
    top:0;
    left:0;
    z-index:1000;

    background:rgba(15,23,42,0.65);
    backdrop-filter:blur(8px);

    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-size:30px;
    font-weight:700;
    color:white;
}

.logo span{
    color:#38bdf8;
}

nav{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#cbd5e1;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

.contact-btn{
    text-decoration:none;
    padding:12px 22px;
    border-radius:10px;
    background:#38bdf8;
    color:#0f172a;
    font-weight:600;
    transition:0.3s;
    white-space:nowrap;
}

.contact-btn:hover{
    transform:translateY(-3px);
    background:#7dd3fc;
}

/* CONTACT SECTION */

.contact-section{
    min-height:100vh;
    padding:150px 8% 80px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.contact-container{
    width:100%;
    max-width:1300px;

    display:grid;
    grid-template-columns:1fr 1fr;

    gap:40px;
}

/* LEFT */

.contact-info{

    background:rgba(30,41,59,0.55);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:50px 40px;

    backdrop-filter:blur(8px);

    display:flex;
    flex-direction:column;
    justify-content:center;
}

.info-box{
    display:flex;
    align-items:center;
    gap:25px;

    margin-bottom:50px;
}

.info-icon{

    width:85px;
    min-width:85px;
    height:85px;

    border-radius:50%;

    background:#1e293b;

    border:2px solid #38bdf8;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#38bdf8;
    font-size:34px;

    transition:0.4s;
}

.info-box:hover .info-icon{
    transform:rotate(10deg) scale(1.08);
}

.info-text h2{
    font-size:30px;
    color:#38bdf8;
    margin-bottom:6px;
    word-break:break-word;
}

.info-text p{
    font-size:20px;
    color:#cbd5e1;
    line-height:1.7;
    word-break:break-word;
}

/* RIGHT */

.contact-form{

    background:rgba(30,41,59,0.55);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:45px;

    backdrop-filter:blur(8px);
}

.contact-form h1{
    text-align:center;
    font-size:46px;
    color:#38bdf8;
    margin-bottom:15px;
}

.form-line{
    width:120px;
    height:4px;
    background:#38bdf8;
    margin:0 auto 35px;
    border-radius:10px;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

.input-box label{
    font-size:22px;
    margin-bottom:10px;
    color:white;
}

.input-box input,
.input-box textarea{

    width:100%;

    padding:16px 18px;

    border:none;
    outline:none;

    border-radius:12px;

    background:#e2e8f0;

    font-size:17px;

    color:#0f172a;
}

.input-box textarea{
    height:180px;
    resize:none;
}

/* BUTTON */

.submit-btn{

    width:180px;

    padding:16px;

    border:none;
    border-radius:12px;

    background:#38bdf8;

    color:#0f172a;

    font-size:20px;
    font-weight:600;

    cursor:pointer;

    transition:0.4s;

    margin:auto;
    margin-top:10px;
}

.submit-btn:hover{
    transform:translateY(-5px);
    background:#7dd3fc;
}

/* POPUP */

.popup{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.6);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:0.4s;

    z-index:9999;

    padding:20px;
}

.popup.active{
    opacity:1;
    visibility:visible;
}

.popup-box{

    width:100%;
    max-width:380px;

    background:#1e293b;

    border:2px solid #38bdf8;

    border-radius:24px;

    padding:40px 30px;

    text-align:center;

    transform:scale(0.7);

    transition:0.4s;
}

.popup.active .popup-box{
    transform:scale(1);
}

.popup-box i{

    font-size:70px;

    color:#38bdf8;

    margin-bottom:20px;
}

.popup-box h2{

    font-size:36px;

    margin-bottom:10px;

    color:white;
}

.popup-box p{

    font-size:18px;

    color:#cbd5e1;

    margin-bottom:30px;
}

.popup-box button{

    padding:14px 35px;

    border:none;

    border-radius:12px;

    background:#38bdf8;

    color:#0f172a;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.popup-box button:hover{
    background:#7dd3fc;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
    border-top:1px solid rgba(255,255,255,0.08);
    background:#0f172a;
}

/* TABLET RESPONSIVE */

@media(max-width:1100px){

    header{
        padding:18px 5%;
    }

    .contact-section{
        padding:140px 5% 70px;
    }

    .contact-container{
        grid-template-columns:1fr;
    }

    nav{
        gap:18px;
    }

    .contact-info,
    .contact-form{
        padding:35px;
    }

    .info-text h2{
        font-size:26px;
    }

    .info-text p{
        font-size:18px;
    }
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

    header{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
        padding:15px 5%;
    }

    .logo{
        width:100%;
        text-align:center;
        font-size:24px;
    }

    nav{
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
        gap:14px;
    }

    nav a{
        font-size:15px;
    }

    .contact-btn{
        padding:10px 18px;
        font-size:14px;
    }

    .contact-section{
        padding:200px 5% 60px;
    }

    .contact-container{
        gap:25px;
    }

    .contact-info,
    .contact-form{
        padding:28px 20px;
        border-radius:18px;
    }

    .contact-form h1{
        font-size:34px;
    }

    .form-line{
        width:90px;
    }

    .info-box{
        flex-direction:column;
        text-align:center;
        gap:18px;
        margin-bottom:35px;
    }

    .info-icon{
        width:70px;
        min-width:70px;
        height:70px;
        font-size:28px;
    }

    .info-text h2{
        font-size:22px;
    }

    .info-text p{
        font-size:15px;
    }

    .input-box label{
        font-size:18px;
    }

    .input-box input,
    .input-box textarea{
        font-size:15px;
        padding:14px 16px;
    }

    .submit-btn{
        width:100%;
        font-size:18px;
    }

    .popup-box{
        padding:30px 20px;
    }

    .popup-box h2{
        font-size:28px;
    }

    .popup-box p{
        font-size:15px;
    }

    footer{
        font-size:14px;
        padding:16px;
    }
}

/* SMALL MOBILE */

@media(max-width:480px){

    .logo{
        font-size:22px;
    }

    nav{
        gap:10px;
    }

    nav a{
        font-size:14px;
    }

    .contact-btn{
        width:100%;
        text-align:center;
    }

    .contact-section{
        padding-top:230px;
    }

    .contact-form h1{
        font-size:28px;
    }

    .info-text h2{
        font-size:20px;
    }

    .info-text p{
        font-size:14px;
    }

    .input-box label{
        font-size:16px;
    }

    .submit-btn{
        padding:14px;
        font-size:16px;
    }

    .popup-box i{
        font-size:55px;
    }

    .popup-box h2{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo">
        <span>●</span> Subodha
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="education.html">Education</a>
        <a href="career.html">Career</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="achieve.html">Achievements</a>
    </nav>

    <a href="contact.html" class="contact-btn">
        <i class="fa-solid fa-envelope"></i>
        Contact Me
    </a>

</header>

<!-- CONTACT SECTION -->

<section class="contact-section">

    <div class="contact-container">

        <!-- LEFT SIDE -->

        <div class="contact-info">

            <div class="info-box">

                <div class="info-icon">
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="info-text">

                    <h2>E-mail</h2>

                    <p>
                        desaisubodh68@gmail.com
                    </p>

                </div>

            </div>

            <div class="info-box">

                <div class="info-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div class="info-text">

                    <h2>Phone</h2>

                    <p>
                        +91 7022985406
                    </p>

                </div>

            </div>

            <div class="info-box">

                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <div class="info-text">

                    <h2>Davanagere, Karnataka - 577601</h2>

                    <p>
                        India
                    </p>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="contact-form">

            <h1>Contact Me</h1>

            <div class="form-line"></div>

            <form id="contactForm">

                <div class="input-box">

                    <label>Name</label>

                    <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                    required>

                </div>

                <div class="input-box">

                    <label>Email</label>

                    <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                </div>

                <div class="input-box">

                    <label>Message</label>

                    <textarea
                    id="message"
                    placeholder="Write your message..."
                    required></textarea>

                </div>

                <button type="submit" class="submit-btn">
                    Submit
                </button>

            </form>

        </div>

    </div>

</section>

<!-- POPUP -->

<div class="popup" id="successPopup">

    <div class="popup-box">

        <i class="fa-solid fa-circle-check"></i>

        <h2>Success!</h2>

        <p>Details sent successfully.</p>

        <button onclick="closePopup()">
            OK
        </button>

    </div>

</div>

<!-- FOOTER -->

<footer>
    © 2026 • Subodha • All Rights Reserved
</footer>

<!-- JAVASCRIPT -->

<script>

const form = document.getElementById("contactForm");

const popup =
document.getElementById("successPopup");

form.addEventListener("submit", function(e){

    e.preventDefault();

    // GET VALUES

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let message =
    document.getElementById("message").value;

    // WHATSAPP MESSAGE

    let whatsappMessage =
`Hello Subodha,

Name: ${name}

Email: ${email}

Message:
${message}`;

    // YOUR NUMBER

    let phoneNumber = "917022985406";

    // CREATE WHATSAPP URL

    let whatsappURL =
`https://wa.me/${phoneNumber}?text=${encodeURIComponent(whatsappMessage)}`;

    // SHOW POPUP

    popup.classList.add("active");

    // OPEN WHATSAPP

    setTimeout(()=>{

        window.open(whatsappURL, "_blank");

    },1200);

    // RESET FORM

    form.reset();

});

/* CLOSE POPUP */

function closePopup(){

    popup.classList.remove("active");

}

</script>

</body>
</html>
